name: Dispatch Listener
version: 0.2.1
slug: dispatch_listener
description: >
  Listens to a radio/scanner audio feed (USB sound card → PulseAudio),
  decodes dispatch tones (DTMF), transcribes the post-tone voice content
  with local Whisper, and fires Home Assistant webhooks on configured
  station codes or detected phrases. Works with any fire/EMS/police
  dispatch system that uses tone-based unit alerting.
url: https://github.com/drobinson911/ha-dispatch-listener
arch:
  - aarch64
  - amd64
  - armv7
init: false
audio: true
homeassistant_api: false
host_network: false
map:
  - share:rw
options:
  pulse_source: auto
  input_gain_db: 0
  tone_system: dtmf
  match_codes: []
  code_pattern: ""
  learning_mode: true
  webhook_url: ""
  transcribe_after_match: true
  transcribe_seconds: 30
  whisper_model: base.en
  phrase_triggers: []
  archive_mode: snapshot_on_match
  archive_pre_seconds: 5
  archive_post_seconds: 25
  snapshot_dir: /share/dispatch_listener/captures
  log_level: info
schema:
  pulse_source: str
  input_gain_db: float(-20.0,20.0)
  tone_system: list(dtmf)
  match_codes:
    - str
  code_pattern: str
  learning_mode: bool
  webhook_url: str
  transcribe_after_match: bool
  transcribe_seconds: int(5,300)
  whisper_model: list(tiny.en|base.en|small.en|tiny|base|small)
  phrase_triggers:
    - phrase: str
      webhook_url: str?
  archive_mode: list(off|snapshot_on_match|snapshot_on_any|rolling_30min)
  archive_pre_seconds: int(0,30)
  archive_post_seconds: int(0,300)
  snapshot_dir: str
  log_level: list(debug|info|warning|error)
