name: Dispatch Listener
version: 0.8.3
slug: dispatch_listener
description: >
  Listens to a radio/scanner audio feed (USB sound card → PulseAudio),
  decodes dispatch tones (DTMF), continuously transcribes voice with local
  Whisper for pre-alert phrase detection, and fires Home Assistant webhooks
  on configured station codes or detected phrases. Works with any
  fire/EMS/police dispatch system that uses tone-based unit alerting.
url: https://github.com/drobinson911/ha-dispatch-listener
arch:
  - aarch64
  - amd64
  - armv7
init: false
audio: true
homeassistant_api: false
host_network: false
map:
  - share:rw
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: Live audio MP3 stream (when stream_enabled=true)
options:
  pulse_source: auto
  input_gain_db: 0
  tone_system: dtmf
  match_codes: []
  code_pattern: ""
  learning_mode: true
  notify_all_codes: false
  webhook_url: ""
  webhook_routes: []
  db_log_webhook_url: ""
  transcribe_after_match: true
  transcribe_seconds: 30
  whisper_model: base.en
  phrase_triggers: []
  audio_preprocess: true
  beep_detection_enabled: true
  beep_freq_hz: 1000.0
  beep_freq_tolerance_hz: 50.0
  beep_min_ms: 80
  beep_max_ms: 400
  beep_min_gap_ms: 30
  beep_max_gap_ms: 350
  beep_pre_alert_webhook_url: ""
  beep_update_webhook_url: ""
  whisper_server_url: ""
  whisper_server_timeout_sec: 30.0
  continuous_transcription: false
  vad_activation_db: 12.0
  vad_min_burst_seconds: 0.5
  vad_max_burst_seconds: 60.0
  prealert_areas: []
  prealert_for_us_phrases: []
  prealert_call_types: []
  prealert_default_webhook_url: ""
  prealert_fuzzy_threshold: 85
  prealert_streaming_interval_sec: 2.0
  prealert_require_3beep_arm: true
  prealert_arm_window_sec: 30.0
  whisper_initial_prompt: ""
  whisper_initial_prompt_url: ""
  whisper_initial_prompt_token: ""
  whisper_initial_prompt_refresh_hours: 24
  archive_mode: "snapshot_on_match,rolling_30min"
  archive_pre_seconds: 25
  archive_post_seconds: 30
  snapshot_dir: /share/dispatch_listener/captures
  stream_enabled: false
  stream_port: 8765
  stream_bitrate_kbps: 96
  stream_secret: ""
  log_level: info
schema:
  pulse_source: str
  input_gain_db: float(-20.0,20.0)
  tone_system: list(dtmf)
  match_codes:
    - str
  code_pattern: str
  learning_mode: bool
  notify_all_codes: bool
  webhook_url: str
  webhook_routes:
    - code: str
      url: str
  db_log_webhook_url: str
  transcribe_after_match: bool
  transcribe_seconds: int(5,300)
  whisper_model: list(tiny.en|base.en|small.en|tiny|base|small)
  phrase_triggers:
    - phrase: str
      webhook_url: str?
  audio_preprocess: bool
  beep_detection_enabled: bool
  beep_freq_hz: float(100.0,4000.0)
  beep_freq_tolerance_hz: float(5.0,500.0)
  beep_min_ms: int(20,1000)
  beep_max_ms: int(50,2000)
  beep_min_gap_ms: int(10,1000)
  beep_max_gap_ms: int(30,2000)
  beep_pre_alert_webhook_url: str
  beep_update_webhook_url: str
  whisper_server_url: str
  whisper_server_timeout_sec: float(1.0,300.0)
  continuous_transcription: bool
  vad_activation_db: float(3.0,30.0)
  vad_min_burst_seconds: float(0.1,5.0)
  vad_max_burst_seconds: float(5.0,300.0)
  prealert_areas:
    - str
  prealert_for_us_phrases:
    - str
  prealert_call_types:
    - type: str
      phrases:
        - str
      webhook_url: str?
      priority: int?
      must_follow_area: bool?
      not_followed_by:
        - str?
      negative_window_words: int?
  prealert_default_webhook_url: str
  prealert_fuzzy_threshold: int(0,100)
  prealert_streaming_interval_sec: float(0.5,30.0)
  prealert_require_3beep_arm: bool
  prealert_arm_window_sec: float(5.0,300.0)
  whisper_initial_prompt: str
  whisper_initial_prompt_url: str
  whisper_initial_prompt_token: str
  whisper_initial_prompt_refresh_hours: int(0,168)
  archive_mode: str
  archive_pre_seconds: int(0,30)
  archive_post_seconds: int(0,300)
  snapshot_dir: str
  stream_enabled: bool
  stream_port: port
  stream_bitrate_kbps: int(32,256)
  stream_secret: str
  log_level: list(debug|info|warning|error)
